name: Build Android

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Restore release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Fix pre-packaged DB schema (favorites.poemId NOT NULL)
        run: |
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('app/src/main/assets/poems.db')
          c = conn.cursor()
          c.execute('SELECT sql FROM sqlite_master WHERE type=\"table\" AND name=\"favorites\"')
          print('Before:', c.fetchone())
          c.execute('DROP TABLE IF EXISTS favorites')
          c.execute('''CREATE TABLE favorites (
              poemId INTEGER PRIMARY KEY NOT NULL,
              note TEXT NOT NULL DEFAULT '',
              groupName TEXT NOT NULL DEFAULT 'Default',
              createdAt INTEGER NOT NULL DEFAULT 0
          )''')
          conn.commit()
          c.execute('SELECT sql FROM sqlite_master WHERE type=\"table\" AND name=\"favorites\"')
          print('After:', c.fetchone())
          conn.close()
          "

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
